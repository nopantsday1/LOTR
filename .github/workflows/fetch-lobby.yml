name: Fetch AoE2 Lobby Data

on:
  schedule:
    - cron: '* * * * *'   # every minute (GitHub minimum)
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch lobby data
        run: |
          # Try up to 3 times, keep last successful result if all fail
          for i in 1 2 3; do
            curl -s "https://aoe-api.worldsedgelink.com/community/advertisement/findAdvertisements?title=age2&count=200" \
              -o lobby_new.json \
              --max-time 10 \
              --fail && \
            python3 -c "import json,sys; d=json.load(open('lobby_new.json')); assert isinstance(d.get('matches'), list); print(f'OK: {len(d[\"matches\"])} lobbies')" && \
            mv lobby_new.json lobby.json && break || \
            echo "Attempt $i failed, retrying..." && sleep 2
          done
          # If lobby.json still doesn't exist, create empty placeholder
          [ -f lobby.json ] || echo '{"matches":[]}' > lobby.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lobby.json
          git diff --staged --quiet || git commit -m "Update lobby data"
          git push
