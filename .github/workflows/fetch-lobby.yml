name: Fetch AoE2 Lobby Data

on:
  schedule:
    - cron: '* * * * *'   # every minute (GitHub minimum)
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch lobby data
        run: |
          curl -s "https://aoe-api.worldsedgelink.com/community/advertisement/findAdvertisements?title=age2&count=200" \
            -o lobby.json \
            --max-time 10 \
            --fail || echo '{"matches":[]}' > lobby.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lobby.json
          git diff --staged --quiet || git commit -m "Update lobby data"
          git push
