name: Rebuild matches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install requests --break-system-packages || true

      - name: Run rebuild
        run: python3 rebuild_matches.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add matches.json
          git commit -m "Rebuild matches with correct positions" || echo "No changes"
          git pull --rebase origin main
          git push
